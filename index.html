<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>早晚人格测试</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
  }
  .app-container {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }
  .page {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    min-height: 100vh;
    padding: 24px 20px;
    display: none;
    flex-direction: column;
    transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease;
    opacity: 0;
    transform: translateX(100%);
  }
  .page.active {
    display: flex;
    opacity: 1;
    transform: translateX(0);
    position: relative;
  }
  .page.slide-out-left {
    transform: translateX(-100%);
    opacity: 0;
  }
  .page.slide-in-right {
    transform: translateX(0);
    opacity: 1;
  }

  /* 晨间配色 */
  .morning-theme { background: linear-gradient(135deg, #fff8e7 0%, #ffe4b5 50%, #ffd89b 100%); color: #5c3d00; }
  .morning-theme .card { background: rgba(255,255,255,0.85); box-shadow: 0 4px 20px rgba(255,140,0,0.15); }
  .morning-theme .option-card { background: #fff; border: 2px solid #ffd89b; }
  .morning-theme .option-card:hover, .morning-theme .option-card.selected { background: #ff9f43; color: white; border-color: #ff9f43; }
  .morning-theme .progress-bar { background: linear-gradient(90deg, #ff9f43, #ff6b35); }
  .morning-theme .btn-primary { background: linear-gradient(135deg, #ff9f43, #ff6b35); color: white; }
  .morning-theme .btn-secondary { background: rgba(255,159,67,0.2); color: #e67e22; }
  .morning-theme .result-title { color: #d35400; }
  .morning-theme .score-badge { background: linear-gradient(135deg, #ff9f43, #ff6b35); }

  /* 晚间配色 */
  .evening-theme { background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); color: #e0e0ff; }
  .evening-theme .card { background: rgba(255,255,255,0.08); box-shadow: 0 4px 20px rgba(138,43,226,0.2); }
  .evening-theme .option-card { background: rgba(255,255,255,0.1); border: 2px solid rgba(138,43,226,0.4); color: #e0e0ff; }
  .evening-theme .option-card:hover, .evening-theme .option-card.selected { background: linear-gradient(135deg, #8a2be2, #6a5acd); color: white; border-color: #8a2be2; }
  .evening-theme .progress-bar { background: linear-gradient(90deg, #8a2be2, #6a5acd); }
  .evening-theme .btn-primary { background: linear-gradient(135deg, #8a2be2, #6a5acd); color: white; }
  .evening-theme .btn-secondary { background: rgba(138,43,226,0.2); color: #b19cd9; }
  .evening-theme .result-title { color: #dda0dd; }
  .evening-theme .score-badge { background: linear-gradient(135deg, #8a2be2, #6a5acd); }

  /* 首页特殊 */
  .home-page {
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: white;
  }
  .home-title {
    font-size: 2.5rem;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #ff9f43, #8a2be2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .home-subtitle {
    font-size: 1rem;
    color: #a0a0c0;
    margin-bottom: 40px;
  }
  .mode-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 360px;
  }
  .mode-card {
    padding: 28px 24px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .mode-card::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    opacity: 0.15;
  }
  .mode-card.morning {
    background: linear-gradient(135deg, #fff8e7, #ffe4b5);
    color: #5c3d00;
    border: 2px solid #ffd89b;
  }
  .mode-card.morning::before { background: #ff9f43; }
  .mode-card.evening {
    background: linear-gradient(135deg, #1a0b2e, #302b63);
    color: #e0e0ff;
    border: 2px solid #4a3b8c;
  }
  .mode-card.evening::before { background: #8a2be2; }
  .mode-card:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .mode-emoji { font-size: 2.5rem; margin-bottom: 8px; display: block; }
  .mode-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
  .mode-desc { font-size: 0.85rem; opacity: 0.8; }

  /* 答题页 */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .back-btn {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 4px;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .back-btn:hover { opacity: 1; }
  .question-counter {
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0.7;
  }
  .progress-container {
    width: 100%;
    height: 6px;
    background: rgba(0,0,0,0.1);
    border-radius: 3px;
    margin-bottom: 32px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .question-text {
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 32px;
    min-height: 80px;
    display: flex;
    align-items: center;
  }
  .options-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }
  .option-card {
    padding: 18px 20px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.25s ease;
    font-size: 1.05rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option-card:active { transform: scale(0.97); }
  .option-letter {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.9rem;
    background: rgba(0,0,0,0.08);
    flex-shrink: 0;
  }
  .option-card.selected .option-letter { background: rgba(255,255,255,0.3); }

  /* 结果页 */
  .result-page {
    align-items: center;
    text-align: center;
  }
  .result-emoji {
    font-size: 4rem;
    margin-bottom: 16px;
    animation: bounce 1s ease infinite alternate;
  }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
  .result-title {
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .result-movie {
    font-size: 0.95rem;
    opacity: 0.7;
    margin-bottom: 16px;
    font-style: italic;
  }
  .score-badge {
    padding: 8px 20px;
    border-radius: 20px;
    color: white;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 20px;
    display: inline-block;
  }
  .result-desc {
    font-size: 1rem;
    line-height: 1.7;
    margin-bottom: 24px;
    padding: 0 8px;
    opacity: 0.9;
  }
  #radarChart {
    width: 100%;
    height: 300px;
    margin-bottom: 24px;
  }
  .btn-group {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 320px;
  }
  .btn {
    flex: 1;
    padding: 14px 20px;
    border: none;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
  }
  .btn:active { transform: scale(0.96); }

  /* 动画 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in-up { animation: fadeInUp 0.5s ease forwards; }
  .delay-1 { animation-delay: 0.1s; opacity: 0; }
  .delay-2 { animation-delay: 0.2s; opacity: 0; }
  .delay-3 { animation-delay: 0.3s; opacity: 0; }

  /* 保存提示 */
  .save-toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 0.85rem;
    transition: transform 0.3s ease;
    z-index: 1000;
    pointer-events: none;
  }
  .save-toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

    <div class="result-title fade-in-up" id="resultTitle"></div>
    <div class="result-movie fade-in-up delay-1" id="resultMovie"></div>
    <div class="score-badge fade-in-up delay-1" id="scoreBadge"></div>

    <div id="radarChart" class="fade-in-up delay-3"></div>

      <button class="btn btn-secondary" onclick="restartSame()">再测一次</button>
      <button class="btn btn-primary" onclick="goHome()">返回首页</button>

  </div>
</div>

// 状态
let currentMode = null;
let currentQuestion = 0;
let answers = [];
let chartInstance = null;

// 恢复进度
try {
  const saved = localStorage.getItem('personalityTest');
  if (saved) {
    const data = JSON.parse(saved);
    if (data.mode && data.answers && data.answers.length > 0) {
      // 有未完成的进度，可以恢复
    }
  }
} catch(e) {}

function saveProgress() {
  try {
    localStorage.setItem('personalityTest', JSON.stringify({
      mode: currentMode,
      currentQuestion: currentQuestion,
      answers: answers,
      timestamp: Date.now()
    }));
    showToast('进度已保存');
  } catch(e) {}
}

function showToast(msg) {
  const toast = document.getElementById('saveToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function clearProgress() {
  try { localStorage.removeItem('personalityTest'); } catch(e) {}
}

function startTest(mode) {
  currentMode = mode;
  currentQuestion = 0;
  answers = [];
  clearProgress();
  
  const quizPage = document.getElementById('quizPage');
  const homePage = document.getElementById('homePage');
  
  homePage.classList.remove('active');
  homePage.classList.add('slide-out-left');
  
  quizPage.className = 'page ' + (mode === 'morning' ? 'morning-theme' : 'evening-theme') + ' active';
  
  setTimeout(() => {
    homePage.classList.remove('slide-out-left');
    homePage.style.display = 'none';
    renderQuestion();
  }, 400);
}

function renderQuestion() {
  const questions = currentMode === 'morning' ? morningQuestions : eveningQuestions;
  const q = questions[currentQuestion];
  const total = questions.length;
  
  document.getElementById('questionCounter').textContent = (currentQuestion + 1) + '/' + total;
  document.getElementById('progressBar').style.width = ((currentQuestion + 1) / total * 100) + '%';
  document.getElementById('questionText').textContent = q.q;
  
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  
  ['a', 'b', 'c'].forEach((opt, idx) => {
    const card = document.createElement('div');
    card.className = 'option-card';
    card.innerHTML = `<div class="option-letter">${opt.toUpperCase()}</div><div>${q[opt]}</div>`;
    card.onclick = () => selectAnswer(idx + 1);
    container.appendChild(card);
  });
}

function selectAnswer(score) {
  answers.push(score);
  saveProgress();
  
  const questions = currentMode === 'morning' ? morningQuestions : eveningQuestions;
  
  if (currentQuestion < questions.length - 1) {
    currentQuestion++;
    // 滑动动画
    const container = document.getElementById('optionsContainer');
    container.style.opacity = '0';
    container.style.transform = 'translateX(-20px)';
    container.style.transition = 'all 0.2s ease';
    
    setTimeout(() => {
      renderQuestion();
      container.style.opacity = '1';
      container.style.transform = 'translateX(0)';
    }, 200);
  } else {
    showResult();
  }
}
function showResult() {
  const total = answers.reduce((a, b) => a + b, 0);
  const results = currentMode === 'morning' ? morningResults : eveningResults;
  const result = results[total] || results[Object.keys(results).map(Number).reduce((a, b) => Math.abs(b - total) < Math.abs(a - total) ? b : a)];
  
  const quizPage = document.getElementById('quizPage');
  const resultPage = document.getElementById('resultPage');
  
  quizPage.classList.remove('active');
  quizPage.classList.add('slide-out-left');
  
  resultPage.className = 'page result-page ' + (currentMode === 'morning' ? 'morning-theme' : 'evening-theme') + ' active';
  
  document.getElementById('resultEmoji').textContent = result.emoji;
  document.getElementById('resultTitle').textContent = result.name;
  document.getElementById('resultMovie').textContent = result.movie;
  document.getElementById('scoreBadge').textContent = '总分：' + total + '分';
  document.getElementById('resultDesc').textContent = result.desc;
  
  setTimeout(() => {
    quizPage.classList.remove('slide-out-left');
    quizPage.style.display = 'none';
    renderRadarChart(result.radar);
  }, 400);
}

function renderRadarChart(radarData) {
  const chartDom = document.getElementById('radarChart');
  if (chartInstance) chartInstance.dispose();
  
  chartInstance = echarts.init(chartDom);
  
  const isMorning = currentMode === 'morning';
  const indicators = isMorning 
    ? [
        { name: '起床难度', max: 5 },
        { name: '行动力', max: 5 },
        { name: '乐观度', max: 5 },
        { name: '社交欲', max: 5 },
        { name: '自律性', max: 5 }
      ]
    : [
        { name: '完成度', max: 5 },
        { name: '社交能量', max: 5 },
        { name: '幸运值', max: 5 },
        { name: '情绪稳定', max: 5 },
        { name: '自我认同', max: 5 }
      ];
  
  const color = isMorning ? '#ff6b35' : '#8a2be2';
  const bgColor = isMorning ? 'rgba(255,159,67,0.2)' : 'rgba(138,43,226,0.2)';
  
  const option = {
    animation: true,
    animationDuration: 1500,
    animationEasing: 'cubicOut',
    radar: {
      indicator: indicators,
      shape: 'polygon',
      radius: '70%',
      center: ['50%', '50%'],
      axisName: {
        color: isMorning ? '#8b4513' : '#b19cd9',
        fontSize: 12,
        fontWeight: 'bold'
      },
      splitArea: {
        areaStyle: {
          color: [isMorning ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.05)', 
                  isMorning ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.02)']
        }
      },
      axisLine: {
        lineStyle: { color: isMorning ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)' }
      },
      splitLine: {
        lineStyle: { color: isMorning ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)' }
      }
    },
    series: [{
      type: 'radar',
      data: [{
        value: radarData,
        name: '人格画像',
        areaStyle: {
          color: bgColor
        },
        lineStyle: {
          color: color,
          width: 2
        },
        itemStyle: {
          color: color,
          borderWidth: 2,
          borderColor: isMorning ? '#fff' : '#1a1a2e'
        }
      }]
    }]
  };
  
  chartInstance.setOption(option);
}

function goBack() {
  if (currentQuestion > 0) {
    currentQuestion--;
    answers.pop();
    saveProgress();
    renderQuestion();
  }
}

function goHome() {
  clearProgress();
  currentMode = null;
  currentQuestion = 0;
  answers = [];
  
  const pages = document.querySelectorAll('.page');
  pages.forEach(p => {
    p.className = 'page';
    p.style.display = '';
    p.style.opacity = '';
    p.style.transform = '';
  });
  
  document.getElementById('homePage').classList.add('active');
  
  if (chartInstance) {
    chartInstance.dispose();
    chartInstance = null;
  }
}

function restartSame() {
  if (currentMode) {
    const resultPage = document.getElementById('resultPage');
    const quizPage = document.getElementById('quizPage');
    
    resultPage.classList.remove('active');
    resultPage.classList.add('slide-out-left');
    
    currentQuestion = 0;
    answers = [];
    clearProgress();
    
    quizPage.className = 'page ' + (currentMode === 'morning' ? 'morning-theme' : 'evening-theme') + ' active';
    
    setTimeout(() => {
      resultPage.classList.remove('slide-out-left');
      resultPage.style.display = 'none';
      renderQuestion();
    }, 400);
  }
}

// 窗口大小变化时重绘图表
window.addEventListener('resize', () => {
  if (chartInstance) chartInstance.resize();
});
</script>
